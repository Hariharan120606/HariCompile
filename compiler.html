<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HariCompile — Online Compiler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/keymap/sublime.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:       #0d0e11;
    --bg-surface:    #13151a;
    --bg-elevated:   #1a1d24;
    --bg-hover:      #21252e;
    --border:        #2a2d38;
    --border-bright: #3a3d4a;
    --text-primary:  #e4e6f0;
    --text-muted:    #7a7f96;
    --text-dim:      #4a4f62;
    --accent:        #5c9eff;
    --accent-glow:   rgba(92,158,255,0.18);
    --accent-dim:    rgba(92,158,255,0.08);
    --green:         #4ec9b0;
    --red:           #f47174;
    --yellow:        #dcdcaa;
    --orange:        #ce9178;
    --tab-active:    #1e2028;

    --font-ui:   'Outfit', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    user-select: none;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--accent), #7c6aff);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo-name { color: var(--text-primary); }
  .logo-name span { color: var(--accent); }

  .header-sep { flex: 1; }

  .header-info {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-code);
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding-bottom: 8px;
  }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 16px 14px 6px;
  }

  .lang-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.12s;
    font-size: 13.5px;
    color: var(--text-muted);
    border-left: 2px solid transparent;
    position: relative;
  }
  .lang-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }
  .lang-item.active {
    background: var(--accent-dim);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .lang-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN EDITOR AREA ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    height: 38px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 0 0 0;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    height: 36px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    font-family: var(--font-code);
    color: var(--text-muted);
    border-top: 1px solid transparent;
    border-right: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    position: relative;
    transition: background 0.1s, color 0.1s;
    background: var(--bg-surface);
  }
  .tab:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .tab.active {
    background: var(--tab-active);
    color: var(--text-primary);
    border-top-color: var(--accent);
    border-bottom: 1px solid var(--tab-active);
    margin-bottom: -1px;
    z-index: 1;
  }
  .tab-close {
    width: 16px; height: 16px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
    color: var(--text-muted);
  }
  .tab:hover .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--bg-hover); color: var(--red); }

  .tab-add {
    height: 36px;
    padding: 0 14px;
    display: flex; align-items: center;
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.1s;
  }
  .tab-add:hover { color: var(--text-primary); }

  /* ── EDITOR + OUTPUT ── */
  .editor-output {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-pane {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .editor-pane .CodeMirror {
    height: 100%;
    font-family: var(--font-code);
    font-size: 14px;
    line-height: 1.65;
    background: #0d0e11 !important;
    color: #ffffff !important;
  }
  .CodeMirror span { color: #ffffff !important; }
  .cm-keyword, .cm-atom, .cm-number, .cm-def, .cm-variable,
  .cm-variable-2, .cm-variable-3, .cm-type, .cm-comment,
  .cm-string, .cm-string-2, .cm-meta, .cm-qualifier,
  .cm-builtin, .cm-bracket, .cm-tag, .cm-attribute,
  .cm-hr, .cm-link, .cm-error, .cm-operator, .cm-property {
    color: #ffffff !important;
  }
  .editor-pane .CodeMirror-scroll { padding-bottom: 60px; }
  .CodeMirror-gutters { background: #0d0e11 !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--text-dim) !important; }
  .CodeMirror-activeline-background { background: rgba(255,255,255,0.03) !important; }
  .CodeMirror-cursor { border-left-color: var(--accent) !important; }
  .CodeMirror-selected { background: rgba(92,158,255,0.15) !important; }

  /* ── TOOLBAR ── */
  .toolbar {
    height: 42px;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn {
    height: 28px;
    padding: 0 14px;
    border-radius: 5px;
    border: 1px solid transparent;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-run {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    padding: 0 18px;
    box-shadow: 0 0 14px rgba(92,158,255,0.3);
  }
  .btn-run:hover { background: #74adff; box-shadow: 0 0 20px rgba(92,158,255,0.45); }
  .btn-run:active { transform: scale(0.97); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-bright); }

  .toolbar-lang-badge {
    font-family: var(--font-code);
    font-size: 11.5px;
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 9px;
    color: var(--text-muted);
  }

  .stdin-label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-code);
    margin-left: auto;
  }

  /* ── OUTPUT PANEL ── */
  .output-panel {
    height: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    background: var(--bg-base);
    transition: height 0.2s;
    position: relative;
  }

  .output-panel.expanded { height: 380px; }

  .output-header {
    height: 34px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
    cursor: default;
    user-select: none;
  }
  .output-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .output-status {
    font-size: 12px;
    font-family: var(--font-code);
    margin-left: 4px;
  }
  .output-status.ok { color: var(--green); }
  .output-status.err { color: var(--red); }
  .output-status.running { color: var(--yellow); }

  .output-actions { margin-left: auto; display: flex; gap: 6px; }

  .output-resize-btn {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    transition: color 0.1s;
  }
  .output-resize-btn:hover { color: var(--text-primary); }

  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--font-code);
    font-size: 13px;
    line-height: 1.7;
  }
  .output-body::-webkit-scrollbar { width: 6px; }
  .output-body::-webkit-scrollbar-track { background: transparent; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .output-line { white-space: pre-wrap; word-break: break-all; }
  .output-line.stdout { color: #c9d1e0; }
  .output-line.stderr { color: var(--red); }
  .output-line.info   { color: var(--text-dim); font-style: italic; }
  .output-line.success{ color: var(--green); }

  /* ── STDIN PANEL ── */
  .stdin-panel {
    height: 0;
    overflow: hidden;
    transition: height 0.2s;
    border-top: 1px solid transparent;
    flex-shrink: 0;
  }
  .stdin-panel.visible {
    height: 90px;
    border-top-color: var(--border);
  }
  .stdin-inner {
    padding: 8px 14px 8px;
    display: flex; flex-direction: column; gap: 4px; height: 100%;
  }
  .stdin-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .stdin-textarea {
    flex: 1;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: var(--font-code);
    font-size: 12.5px;
    padding: 5px 9px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .stdin-textarea:focus { border-color: var(--border-bright); }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS BAR ── */
  .statusbar {
    height: 24px;
    background: var(--accent);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 16px;
    flex-shrink: 0;
  }
  .statusbar-item {
    font-size: 11.5px;
    font-family: var(--font-code);
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; gap: 4px;
  }
  .statusbar-right { margin-left: auto; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    height: 4px;
    background: transparent;
    cursor: ns-resize;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .resize-handle:hover { background: var(--accent); }

  /* ── JUDGE0 WARNING ── */
  .judge0-info {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-code);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    margin-left: auto;
  }

  /* ── EMPTY TAB STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
    font-size: 13px;
  }
  .empty-state-icon { font-size: 40px; }

  /* ── NOTIFICATION TOAST ── */
  #toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--border-bright);
    color: var(--text-primary);
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-ui);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-name">Hari<span>Compile</span></div>
    </div>
    <div class="header-sep"></div>
    <div class="header-info" id="execTime"></div>
  </header>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section-title">Languages</div>
      <div id="lang-list"></div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- TABS -->
      <div class="tab-bar" id="tabBar">
        <div class="tab-add" id="addTabBtn" title="New tab">+</div>
      </div>

      <!-- EDITOR + OUTPUT -->
      <div class="editor-output">

        <!-- EDITOR PANE -->
        <div class="editor-pane" id="editorPane">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">🖊</div>
            <div>Select a language to start coding</div>
          </div>
        </div>

        <!-- STDIN -->
        <div class="stdin-panel" id="stdinPanel">
          <div class="stdin-inner">
            <div class="stdin-title">Standard Input (stdin)</div>
            <textarea class="stdin-textarea" id="stdinInput" placeholder="Optional input for your program…" spellcheck="false"></textarea>
          </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
          <button class="btn btn-run" id="runBtn" onclick="runCode()">
            ▶ Run
          </button>
          <button class="btn btn-ghost" onclick="clearOutput()">Clear</button>
          <button class="btn btn-ghost" onclick="toggleStdin()">Stdin</button>
          <div class="toolbar-lang-badge" id="langBadge">—</div>
          <span class="judge0-info" id="judgeInfo"></span>
        </div>

        <!-- OUTPUT -->
        <div class="output-panel" id="outputPanel">
          <div class="output-header">
            <div class="output-title">Output</div>
            <div class="output-status" id="outputStatus"></div>
            <div class="output-actions">
              <button class="output-resize-btn" onclick="toggleOutputSize()" title="Expand/Collapse">⤢</button>
            </div>
          </div>
          <div class="output-body" id="outputBody">
            <div class="output-line info">// Run your code to see output here</div>
          </div>
        </div>

      </div><!-- editor-output -->
    </div><!-- main -->
  </div><!-- workspace -->

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="statusbar-item" id="sbLang">⚡ HariCompile</div>
    <div class="statusbar-item" id="sbCursor">Ln 1, Col 1</div>
    <div class="statusbar-item statusbar-right" id="sbMode">Ready</div>
  </div>

</div><!-- app -->

<div id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  LANGUAGE CONFIG
// ──────────────────────────────────────────────
const LANGS = {
  python: {
    name: 'Python',
    ext: '.py',
    cm: 'python',
    color: '#4ec9b0',
    judge0Id: 71,
    native: true,
    default: `# Python — runs in your browser via native JS eval bridge
print("Hello from CodeForge!")

# FizzBuzz
for i in range(1, 21):
    if i % 15 == 0:
        print("FizzBuzz")
    elif i % 3 == 0:
        print("Fizz")
    elif i % 5 == 0:
        print("Buzz")
    else:
        print(i)
`
  },
  javascript: {
    name: 'JavaScript',
    ext: '.js',
    cm: 'javascript',
    color: '#dcdcaa',
    judge0Id: 63,
    native: true,
    default: `// JavaScript — runs natively in your browser
console.log("Hello from CodeForge!");

// Fibonacci
function fib(n) {
  if (n <= 1) return n;
  return fib(n - 1) + fib(n - 2);
}

for (let i = 0; i < 10; i++) {
  console.log(\`fib(\${i}) = \${fib(i)}\`);
}
`
  },
  cpp: {
    name: 'C / C++',
    ext: '.cpp',
    cm: 'text/x-c++src',
    color: '#569cd6',
    judge0Id: 54,
    native: false,
    default: `#include <iostream>
#include <vector>
using namespace std;

int main() {
    cout << "Hello from CodeForge!" << endl;

    // Sieve of Eratosthenes
    int limit = 30;
    vector<bool> sieve(limit + 1, true);
    sieve[0] = sieve[1] = false;

    for (int i = 2; i * i <= limit; i++) {
        if (sieve[i]) {
            for (int j = i * i; j <= limit; j += i)
                sieve[j] = false;
        }
    }

    cout << "Primes up to " << limit << ": ";
    for (int i = 2; i <= limit; i++) {
        if (sieve[i]) cout << i << " ";
    }
    cout << endl;
    return 0;
}
`
  },
  java: {
    name: 'Java',
    ext: '.java',
    cm: 'text/x-java',
    color: '#f89820',
    judge0Id: 62,
    native: false,
    default: `public class Main {
    public static void main(String[] args) {
        System.out.println("Hello from CodeForge!");

        // Bubble Sort
        int[] arr = {64, 34, 25, 12, 22, 11, 90};
        int n = arr.length;
        for (int i = 0; i < n - 1; i++) {
            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    int temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                }
            }
        }
        System.out.print("Sorted: ");
        for (int x : arr) System.out.print(x + " ");
        System.out.println();
    }
}
`
  },
  go: {
    name: 'Go',
    ext: '.go',
    cm: 'go',
    color: '#79d4fd',
    judge0Id: 60,
    native: false,
    default: `package main

import "fmt"

func main() {
    fmt.Println("Hello from CodeForge!")

    // Factorial with recursion
    var factorial func(int) int
    factorial = func(n int) int {
        if n <= 1 {
            return 1
        }
        return n * factorial(n-1)
    }

    for i := 0; i <= 10; i++ {
        fmt.Printf("%d! = %d\\n", i, factorial(i))
    }
}
`
  },
  rust: {
    name: 'Rust',
    ext: '.rs',
    cm: 'rust',
    color: '#ce9178',
    judge0Id: 73,
    native: false,
    default: `fn main() {
    println!("Hello from CodeForge!");

    // Fibonacci iterator
    let (mut a, mut b) = (0u64, 1u64);
    print!("Fibonacci: ");
    for _ in 0..15 {
        print!("{} ", a);
        let c = a + b;
        a = b;
        b = c;
    }
    println!();

    // Pattern matching
    for i in 1..=5 {
        let label = match i % 3 {
            0 => "fizz",
            1 => "one",
            _ => "other",
        };
        println!("{}: {}", i, label);
    }
}
`
  }
};

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let tabs = [];          // [{id, lang, label, editor}]
let activeTab = null;
let tabCounter = 0;
let stdinVisible = false;

// ──────────────────────────────────────────────
//  SIDEBAR LANGUAGES
// ──────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('lang-list');
  Object.entries(LANGS).forEach(([key, lang]) => {
    const item = document.createElement('div');
    item.className = 'lang-item';
    item.dataset.lang = key;
    item.innerHTML = `
      <div class="lang-dot" style="background:${lang.color}"></div>
      <span>${lang.name}</span>
    `;
    item.onclick = () => openNewTabWithLang(key);
    list.appendChild(item);
  });
}

function updateSidebarActive(lang) {
  document.querySelectorAll('.lang-item').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === lang);
  });
}

// ──────────────────────────────────────────────
//  TABS
// ──────────────────────────────────────────────
function openNewTabWithLang(langKey) {
  // Check if a tab already has this lang, open it
  const existing = tabs.find(t => t.lang === langKey);
  if (existing) { activateTab(existing.id); return; }

  const lang = LANGS[langKey];
  const id = ++tabCounter;

  // Create editor div
  const editorDiv = document.createElement('textarea');
  editorDiv.style.display = 'none';
  document.getElementById('editorPane').appendChild(editorDiv);

  const cm = CodeMirror.fromTextArea(editorDiv, {
    mode: lang.cm,
    theme: 'one-dark',
    lineNumbers: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    styleActiveLine: true,
    keyMap: 'sublime',
    tabSize: 4,
    indentWithTabs: langKey === 'go',
    extraKeys: {
      'Ctrl-Enter': runCode,
      'Cmd-Enter': runCode,
    }
  });

  cm.setValue(lang.default);
  cm.on('cursorActivity', updateCursorStatus);
  // Hide initially
  cm.getWrapperElement().style.display = 'none';
  cm.getWrapperElement().style.height = '100%';

  const tab = { id, lang: langKey, label: `${lang.name}${lang.ext}`, cm };
  tabs.push(tab);

  // Render tab
  renderTabs();
  activateTab(id);
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  // Remove old tabs (keep add button)
  bar.querySelectorAll('.tab').forEach(e => e.remove());
  const addBtn = document.getElementById('addTabBtn');

  tabs.forEach(tab => {
    const lang = LANGS[tab.lang];
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTab ? ' active' : '');
    el.dataset.tabId = tab.id;
    el.innerHTML = `
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${lang.color};margin-right:2px;"></span>
      ${tab.label}
      <span class="tab-close" data-close="${tab.id}">✕</span>
    `;
    el.onclick = (e) => {
      if (e.target.dataset.close) { closeTab(+e.target.dataset.close); return; }
      activateTab(tab.id);
    };
    bar.insertBefore(el, addBtn);
  });
}

function activateTab(id) {
  activeTab = id;
  const tab = tabs.find(t => t.id === id);

  // Show/hide editors
  tabs.forEach(t => {
    t.cm.getWrapperElement().style.display = t.id === id ? 'block' : 'none';
  });

  document.getElementById('emptyState').style.display = tabs.length === 0 ? 'flex' : 'none';

  if (tab) {
    const lang = LANGS[tab.lang];
    tab.cm.refresh();
    tab.cm.focus();
    updateSidebarActive(tab.lang);
    document.getElementById('langBadge').textContent = lang.name + lang.ext;
    document.getElementById('sbLang').textContent = `⚡ ${lang.name}`;
    document.getElementById('judgeInfo').textContent = '🖥️ Flask backend';
    updateCursorStatus();
  }

  renderTabs();
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs[idx].cm.getWrapperElement().remove();
  tabs.splice(idx, 1);

  if (activeTab === id) {
    const next = tabs[Math.min(idx, tabs.length - 1)];
    if (next) activateTab(next.id);
    else {
      activeTab = null;
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('langBadge').textContent = '—';
      document.getElementById('sbLang').textContent = '⚡ HariCompile';
      document.getElementById('judgeInfo').textContent = '';
    }
  }
  renderTabs();
}

document.getElementById('addTabBtn').onclick = () => {
  // Open python as default
  const next = Object.keys(LANGS).find(k => !tabs.find(t => t.lang === k));
  if (next) openNewTabWithLang(next);
  else toast('All languages are already open!');
};

// ──────────────────────────────────────────────
//  FLASK API CONFIG
// ──────────────────────────────────────────────
const FLASK_API = 'http://localhost:5000/api/run';

// ──────────────────────────────────────────────
//  RUN CODE — sends to Flask backend
// ──────────────────────────────────────────────
async function runCode() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) { toast('No active tab!'); return; }

  const code  = tab.cm.getValue();
  const lang  = LANGS[tab.lang];
  const stdin = document.getElementById('stdinInput').value;

  setRunning(true);
  clearOutput();
  const t0 = Date.now();

  appendOutput('info', `⏳ Sending to Flask… (${lang.name})`);

  try {
    const res = await fetch(FLASK_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: tab.lang, code, stdin }),
    });

    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Flask returned ${res.status}: ${txt}`);
    }

    const data = await res.json();

    // Clear the "sending…" line
    document.getElementById('outputBody').innerHTML = '';

    // Compile error (C++, Java, Rust)
    if (data.compile_error) {
      appendOutput('stderr', '── Compile Error ──');
      data.compile_error.split('\n').forEach(l => appendOutput('stderr', l));
      setStatus('err', 'Compile Error');
    } else {
      // stdout
      if (data.stdout) {
        data.stdout.trimEnd().split('\n').forEach(l => appendOutput('stdout', l));
      }
      // stderr
      if (data.stderr) {
        appendOutput('stderr', '── stderr ──');
        data.stderr.trimEnd().split('\n').forEach(l => appendOutput('stderr', l));
      }
      if (!data.stdout && !data.stderr) {
        appendOutput('info', '(no output)');
      }

      if (data.returncode === 0) {
        appendOutput('success', `\n✓ Exited successfully — ${data.time}s`);
        setStatus('ok', 'Finished');
      } else if (data.returncode === -1 && data.stderr.includes('Time limit')) {
        setStatus('err', 'TLE');
      } else {
        appendOutput('stderr', `\nProcess exited with code ${data.returncode}`);
        setStatus('err', 'Runtime Error');
      }
    }

  } catch (e) {
    document.getElementById('outputBody').innerHTML = '';
    appendOutput('stderr', '⚠ Could not reach Flask server.');
    appendOutput('info', '');
    appendOutput('info', '💡 Make sure the Flask server is running:');
    appendOutput('info', '   cd haricompile/');
    appendOutput('info', '   pip install flask');
    appendOutput('info', '   python app.py');
    appendOutput('info', '');
    appendOutput('info', `   Error: ${e.message}`);
    setStatus('err', 'Server Offline');
  }

  const elapsed = ((Date.now() - t0) / 1000).toFixed(2);
  document.getElementById('execTime').textContent = `${elapsed}s`;
  setRunning(false);
}

// ──────────────────────────────────────────────
//  OUTPUT HELPERS
// ──────────────────────────────────────────────
function appendOutput(type, text) {
  const body = document.getElementById('outputBody');
  // Remove placeholder
  body.querySelectorAll('.output-line.info').forEach(el => {
    if (el.textContent === '// Run your code to see output here') el.remove();
  });

  const el = document.createElement('div');
  el.className = `output-line ${type}`;
  el.textContent = text;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
}

function clearOutput() {
  document.getElementById('outputBody').innerHTML =
    '<div class="output-line info">// Run your code to see output here</div>';
  document.getElementById('outputStatus').textContent = '';
  document.getElementById('outputStatus').className = 'output-status';
  document.getElementById('execTime').textContent = '';
}

function setStatus(type, text) {
  const el = document.getElementById('outputStatus');
  el.textContent = text;
  el.className = `output-status ${type}`;
  document.getElementById('sbMode').textContent = text;
}

function setRunning(v) {
  const btn = document.getElementById('runBtn');
  if (v) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Running…';
    setStatus('running', 'Running…');
    document.getElementById('sbMode').textContent = 'Running…';
  } else {
    btn.disabled = false;
    btn.innerHTML = '▶ Run';
  }
}

// ──────────────────────────────────────────────
//  STDIN / OUTPUT SIZE TOGGLE
// ──────────────────────────────────────────────
function toggleStdin() {
  stdinVisible = !stdinVisible;
  document.getElementById('stdinPanel').classList.toggle('visible', stdinVisible);
}

function toggleOutputSize() {
  document.getElementById('outputPanel').classList.toggle('expanded');
}

// ──────────────────────────────────────────────
//  CURSOR STATUS
// ──────────────────────────────────────────────
function updateCursorStatus() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  const pos = tab.cm.getCursor();
  document.getElementById('sbCursor').textContent = `Ln ${pos.line + 1}, Col ${pos.ch + 1}`;
}

// ──────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ──────────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ──────────────────────────────────────────────
//  KEYBOARD SHORTCUT: Ctrl+Enter to run
// ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
buildSidebar();
openNewTabWithLang('python');
openNewTabWithLang('javascript');
</script>
